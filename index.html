<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nửa Trái Tim - 半点心</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDK (COMPAT - chuẩn cho web tĩnh) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Quicksand',sans-serif;
}

body{
background:#edf5ef;
color:#5f7062;
}

/* ===== AUTH ===== */
#auth{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.35);
z-index:999;
}

.box{
width:340px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
text-align:center;
}

.box h2{
margin-bottom:18px;
color:#5f7d65;
}

.box input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:12px;
border:1px solid #dce9de;
outline:none;
}

.box button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:12px;
background:#6e9175;
color:white;
font-weight:700;
cursor:pointer;
}

.small{
margin-top:10px;
font-size:12px;
cursor:pointer;
color:#7a8a7c;
}

/* ===== MAIN ===== */
.main{
display:none;
padding:20px;
}

.header{
text-align:center;
margin-top:35px;
}

.logo{
width:105px;
height:105px;
border-radius:50%;
object-fit:cover;
border:5px solid #dce9de;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.title{
margin-top:18px;
font-size:42px;
font-weight:700;
color:#5f7d65;
}

.sub{
margin-top:10px;
font-size:17px;
letter-spacing:6px;
color:#91a393;
}

.join{
margin-top:20px;
}

.join-btn{
padding:12px 25px;
border:none;
border-radius:999px;
background:#6e9175;
color:white;
font-weight:700;
cursor:pointer;
}

.desc{
margin-top:30px;
text-align:center;
line-height:1.8;
}

.footer{
margin-top:60px;
text-align:center;
font-size:13px;
color:#8b998e;
}

</style>
</head>

<body>

<!-- ===== AUTH UI ===== -->
<div id="auth">
  <div class="box">
    <h2>🌿 Nửa Trái Tim</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mật khẩu">

    <button onclick="login()">Đăng nhập</button>
    <button onclick="signup()" style="background:#8fb39a">Đăng ký</button>

    <div class="small" onclick="logout()">
      Thử đăng xuất
    </div>
  </div>
</div>

<!-- ===== MAIN WEB ===== -->
<div class="main" id="main">

<div class="header">
<img class="logo" src="avt.jpg">

<div class="title">Nửa Trái Tim</div>
<div class="sub">半点心</div>

<div class="join">
<button class="join-btn" onclick="logout()">Đăng xuất</button>
</div>

<div class="desc">
Chào mừng cậu đến với khu vườn nhỏ của mình ✨
</div>

</div>

<div class="footer">
© Nửa Trái Tim - 半点心
</div>

</div>

<!-- ===== FIREBASE CONFIG ===== -->
<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* ===== SIGN UP ===== */
function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(()=> alert("Tạo tài khoản thành công 🌿"))
  .catch(e=> alert(e.message));
}

/* ===== LOGIN ===== */
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .catch(e=> alert(e.message));
}

/* ===== LOGOUT ===== */
function logout(){
  auth.signOut();
}

/* ===== AUTO CHECK LOGIN ===== */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("main").style.display="block";
  }else{
    document.getElementById("auth").style.display="flex";
    document.getElementById("main").style.display="none";
  }
});
</script>

</body>
</html>
