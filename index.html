<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nửa Trái Tim</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<!-- FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body{
margin:0;
font-family:'Quicksand',sans-serif;
background:#edf5ef;
}

#auth{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.3);
}

.box{
width:320px;
background:#fff;
padding:25px;
border-radius:20px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#6e9175;
color:#fff;
font-weight:700;
cursor:pointer;
}

.main{
display:none;
text-align:center;
padding:40px;
}

.title{
font-size:35px;
font-weight:700;
color:#5f7d65;
}

.logout{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:999px;
background:#6e9175;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="box">
    <h2>Đăng nhập</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mật khẩu">

    <button onclick="signup()">Đăng ký</button>
    <button onclick="login()">Đăng nhập</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="title">Nửa Trái Tim 💚</div>
  <button class="logout" onclick="logout()">Đăng xuất</button>
</div>

<!-- FIREBASE -->
<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBiOvgiCMOEPDpRDkYTq_icEKDrr31CmdM",
  authDomain: "nuatraitim-new.firebaseapp.com",
  projectId: "nuatraitim-new",
  storageBucket: "nuatraitim-new.firebasestorage.app",
  messagingSenderId: "881395175041",
  appId: "1:881395175041:web:cf7a852eb84758d21c0780",
  measurementId: "G-CFZM706727"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* SIGN UP */
function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .then(()=> alert("Đăng ký thành công"))
  .catch(e=> alert(e.message));
}

/* LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .catch(e=> alert(e.message));
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* UI SWITCH */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("main").style.display="block";
  }else{
    document.getElementById("auth").style.display="flex";
    document.getElementById("main").style.display="none";
  }
});
</script>

</body>
</html>
