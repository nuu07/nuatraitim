<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nửa Trái Tim - 半点心</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Quicksand',sans-serif;
}

body{
background:#edf5ef;
padding:20px;
color:#5f7062;
}

.header{
text-align:center;
margin-top:35px;
}

.logo{
width:105px;
height:105px;
border-radius:50%;
object-fit:cover;
border:5px solid #dce9de;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.title{
margin-top:18px;
font-size:42px;
font-weight:700;
color:#5f7d65;
}

.sub{
margin-top:10px;
font-size:17px;
letter-spacing:6px;
color:#91a393;
}

.join{
margin-top:30px;
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

.bell{
width:55px;
height:55px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
box-shadow:0 5px 15px rgba(0,0,0,.06);
}

.join-btn{
padding:15px 28px;
border:none;
border-radius:999px;
background:#6e9175;
color:white;
font-size:17px;
font-weight:700;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.desc{
margin-top:35px;
text-align:center;
font-size:18px;
line-height:1.9;
color:#718174;
}

.filter-box{
background:white;
margin-top:45px;
border-radius:32px;
padding:28px;
box-shadow:0 10px 25px rgba(0,0,0,.05);
}

.filters{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.filters button{
padding:13px 22px;
border:none;
border-radius:999px;
background:#edf5ef;
color:#617566;
font-weight:700;
cursor:pointer;
font-size:15px;
}

.filters .active{
background:#6f9275;
color:white;
}

.sort{
margin-top:25px;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
flex-wrap:wrap;
font-weight:700;
color:#748277;
}

.sort select{
padding:12px 18px;
border:none;
border-radius:999px;
background:#edf5ef;
color:#607465;
font-weight:700;
outline:none;
cursor:pointer;
}

.grid{
margin-top:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:25px;
}

.empty{
background:white;
padding:45px 30px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.05);
line-height:2;
color:#748176;
font-size:18px;
}

.footer{
margin-top:70px;
padding-bottom:30px;
text-align:center;
font-size:14px;
color:#8b998e;
}

@media(max-width:600px){

.title{
font-size:35px;
}

.desc{
font-size:16px;
}

.filter-box{
padding:22px;
}

}

</style>
</head>

<body>

<div class="header">

<img class="logo"
src="avt.jpg">

<div class="title">
Nửa Trái Tim
</div>

<div class="sub">
半点心
</div>

<div class="join">

<div class="bell">
🔔
</div>

<button class="join-btn">
Gia nhập trái tim 🌿
</button>

</div>

<div class="desc">
Chào mừng cậu đến với khu vườn nhỏ của mình ✨
</div>

</div>

<div class="filter-box">

<div class="filters">

<button class="active">
Tất cả
</button>

<button>
Nửa Trái Tim 💚
</button>

<button>
Trái Tim Xing Xing ✨
</button>

</div>

<div class="sort">

<span>
Sắp xếp:
</span>

<select>

<option>
Mặc định
</option>

<option>
Tên truyện A-Z
</option>

<option>
Mới cập nhật
</option>

<option>
Hoàn thành
</option>

</select>

</div>

</div>

<div class="grid">

<div class="empty">
Hiện tại chưa có truyện nào được đăng 🌿
</div>

</div>

<div class="footer">
© Nửa Trái Tim - 半点心
</div>

</body>
</html>
