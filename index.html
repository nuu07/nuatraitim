<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nửa Trái Tim</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Quicksand',sans-serif;}
body{background:#edf5ef;}

/* LOGIN */
#auth{
position:fixed;inset:0;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#dce9de,#edf5ef);
}

.box{
width:340px;
background:#fff;
padding:25px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.15);
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#6e9175;
color:#fff;
font-weight:700;
cursor:pointer;
}

/* MAIN */
.main{
display:none;
padding:20px;
}

.header{
text-align:center;
margin-top:20px;
}

.title{
font-size:28px;
font-weight:700;
color:#5f7d65;
}

.logout{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:999px;
background:#6e9175;
color:#fff;
cursor:pointer;
}

/* STORIES */
.grid{
margin-top:25px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,.08);
cursor:pointer;
}

.card p{
color:#666;
font-size:13px;
margin-top:6px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="box">
    <h2>🌿 Nửa Trái Tim</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mật khẩu">

    <button onclick="signup()">Đăng ký</button>
    <button onclick="login()">Đăng nhập</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">

  <div class="header">
    <div class="title">Nửa Trái Tim 💚</div>
    <button class="logout" onclick="logout()">Đăng xuất</button>
  </div>

  <div class="grid" id="storyList"></div>

</div>

<script>

/* ===== FIREBASE CONFIG ===== */
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBiOvgiCMOEPDpRDkYTq_icEKDrr31CmdM",
  authDomain: "nuatraitim-new.firebaseapp.com",
  projectId: "nuatraitim-new",
  storageBucket: "nuatraitim-new.firebasestorage.app",
  messagingSenderId: "881395175041",
  appId: "1:881395175041:web:cf7a852eb84758d21c0780",
  measurementId: "G-CFZM706727"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ===== SIGNUP ===== */
function signup(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
  .catch(e=>alert(e.message));
}

/* ===== LOGIN ===== */
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .catch(e=>alert(e.message));
}

/* ===== LOGOUT ===== */
function logout(){
  auth.signOut();
}

/* ===== LOAD STORIES (USER ONLY) ===== */
function loadStories(){
  db.collection("stories")
  .orderBy("createdAt","desc")
  .onSnapshot(snap=>{
    const list = document.getElementById("storyList");
    list.innerHTML = "";

    snap.forEach(doc=>{
      const s = doc.data();

      list.innerHTML += `
        <div class="card">
          <b>${s.title}</b>
          <p>${(s.content || "").slice(0,80)}...</p>
        </div>
      `;
    });
  });
}

/* ===== AUTH STATE ===== */
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("auth").style.display="none";
    document.getElementById("main").style.display="block";

    loadStories();

  }else{
    document.getElementById("auth").style.display="flex";
    document.getElementById("main").style.display="none";
  }
});

</script>

</body>
</html>
